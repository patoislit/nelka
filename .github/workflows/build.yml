name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Nelka-Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/Nelka-Mac.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts

      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upload to Firebase Storage
        run: |
          cat > /tmp/upload.mjs << 'EOF'
          import { createSign } from 'crypto';
          import { createReadStream, statSync, writeFileSync } from 'fs';
          import https from 'https';

          const sa = JSON.parse(process.env.FIREBASE_SA);
          const BUCKET = 'nelka-87b28.firebasestorage.app';

          function getToken() {
            const now = Math.floor(Date.now() / 1000);
            const h = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
            const p = Buffer.from(JSON.stringify({
              iss: sa.client_email,
              scope: 'https://www.googleapis.com/auth/devstorage.read_write',
              aud: 'https://oauth2.googleapis.com/token',
              iat: now, exp: now + 3600,
            })).toString('base64url');
            const sign = createSign('RSA-SHA256');
            sign.update(`${h}.${p}`);
            const jwt = `${h}.${p}.${sign.sign(sa.private_key, 'base64url')}`;
            const body = `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`;
            return new Promise((res, rej) => {
              const req = https.request({ hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': body.length }
              }, r => { let d = ''; r.on('data', c => d += c); r.on('end', () => { const j = JSON.parse(d); j.access_token ? res(j.access_token) : rej(d); }); });
              req.on('error', rej); req.write(body); req.end();
            });
          }

          async function makePublic(token, name) {
            const body = JSON.stringify({ role: 'READER', entity: 'allUsers' });
            return new Promise(res => {
              const req = https.request({ hostname: 'storage.googleapis.com',
                path: `/storage/v1/b/${BUCKET}/o/${encodeURIComponent(name)}/acl`, method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Content-Length': body.length }
              }, r => { r.resume(); r.on('end', res); });
              req.on('error', res); req.write(body); req.end();
            });
          }

          async function upload(token, localPath, name) {
            const size = statSync(localPath).size;
            console.log(`Uploading ${name} (${(size/1024/1024).toFixed(1)} MB)...`);
            const ct = name.endsWith('.exe') ? 'application/octet-stream' : 'application/x-apple-diskimage';
            return new Promise((res, rej) => {
              const req = https.request({ hostname: 'storage.googleapis.com',
                path: `/upload/storage/v1/b/${BUCKET}/o?uploadType=media&name=${encodeURIComponent('releases/' + name)}`,
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': ct, 'Content-Length': size }
              }, r => { let d = ''; r.on('data', c => d += c); r.on('end', async () => {
                if (r.statusCode === 200) { await makePublic(token, 'releases/' + name); console.log(`OK: ${name}`); res(); }
                else rej(new Error(`${r.statusCode}: ${d}`));
              }); });
              req.on('error', rej); createReadStream(localPath).pipe(req);
            });
          }

          const ws = process.env.GITHUB_WORKSPACE;
          const token = await getToken();
          await upload(token, `${ws}/artifacts/Nelka-Windows.exe`, 'Nelka-Windows.exe');
          await upload(token, `${ws}/artifacts/Nelka-Mac.dmg`, 'Nelka-Mac.dmg');
          console.log('Firebase Storage upload complete!');
          EOF
          node /tmp/upload.mjs
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
