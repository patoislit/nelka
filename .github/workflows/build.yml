name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Nelka-Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/Nelka-Mac.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts

      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: artifacts

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Nelka – najnovšia verzia"
          body: |
            ## Nelka ${{ github.ref_name }}
            - **Windows** — stiahni `Nelka-Windows.exe`, spusti dvojklikom (portable, nevyžaduje inštaláciu)
            - **Mac** — stiahni `Nelka-Mac.dmg`, otvor a presuň do Applications

            **Web app:** https://nelka-87b28.web.app
          files: |
            artifacts/Nelka-Windows.exe
            artifacts/Nelka-Mac.dmg
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
