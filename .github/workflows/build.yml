name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (React app)
        run: npm run build

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Nelka-Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (React app)
        run: npm run build

      - name: Build Mac (universal — Intel + Apple Silicon)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/Nelka-Mac.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts

      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: artifacts

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Nelka – najnovšia verzia"
          body: |
            ## Nelka ${{ github.ref_name }}

            ### Windows
            Stiahni `Nelka-Windows.exe` a spusti dvojklikom (portable, nevyžaduje inštaláciu).

            ### Mac (Intel + Apple Silicon)
            1. Stiahni `Nelka-Mac.dmg`
            2. Otvor súbor — zobrazí sa okno s ikonou Nelka a šípkou na Applications
            3. Presuň ikonu Nelka do Applications
            4. **Zavrí (eject) DMG disk** — klikni pravým tlačidlom na disk na ploche → Vysunúť, alebo ho pretiahni do koša
            5. Otvor Finder → Applications → Nelka
            6. **Prvé spustenie:** macOS zablokuje appku pretože nie je z App Store → otvor **System Settings → Privacy & Security**, zoskoč nadol a klikni **"Open Anyway"** → v dialógu klikni **Open**

            > Appka nie je podpísaná Apple certifikátom — preto macOS varuje. Je to bezpečné, zdrojový kód je verejný na GitHube.

            **Web app:** https://nelka-87b28.web.app
          files: |
            artifacts/Nelka-Windows.exe
            artifacts/Nelka-Mac.dmg
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
