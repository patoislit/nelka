name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (React app)
        run: npm run build

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Nelka-Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (React app)
        run: npm run build

      - name: Build Mac (Intel x64 + Apple Silicon arm64)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-intel
          path: release/Nelka-Mac-x64.dmg

      - name: Upload Mac Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm
          path: release/Nelka-Mac-arm64.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts

      - name: Download Mac Intel
        uses: actions/download-artifact@v4
        with:
          name: mac-intel
          path: artifacts

      - name: Download Mac Apple Silicon
        uses: actions/download-artifact@v4
        with:
          name: mac-arm
          path: artifacts

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Nelka – najnovšia verzia"
          body: |
            ## Nelka ${{ github.ref_name }}

            ### Windows
            Stiahni `Nelka-Windows.exe` a spusti dvojklikom (portable, nevyžaduje inštaláciu).

            ### Mac
            - **Apple Silicon (M1/M2/M3/M4)** → stiahni `Nelka-Mac-arm64.dmg`
            - **Intel** → stiahni `Nelka-Mac-x64.dmg`

            **Ako zistiť ktorý Mac máš:** Apple menu () → About This Mac → Chip
            - Ak vidíš "Apple M..." → stiahni arm64
            - Ak vidíš "Intel" → stiahni x64

            **Inštalácia:**
            1. Otvor DMG → presuň Nelka do Applications
            2. Eject DMG (normálne, ignoruj)
            3. Finder → Applications → Nelka → **pravý klik → Open** (len prvý raz)
            4. Ak macOS blokuje: System Settings → Privacy & Security → **Open Anyway**

            **Web app:** https://nelka-87b28.web.app
          files: |
            artifacts/Nelka-Windows.exe
            artifacts/Nelka-Mac-x64.dmg
            artifacts/Nelka-Mac-arm64.dmg
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
